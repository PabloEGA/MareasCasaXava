name: Update tide data

# Runs once a day, plus a manual "Run workflow" button in the Actions tab.
on:
  schedule:
    - cron: "20 9 * * *"   # 09:20 UTC daily  =  04:20 in Panama (UTC-5)
  workflow_dispatch: {}

# Allow the job to commit the refreshed tides.json back to the repo.
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch latest tide predictions from NOAA
        run: node scripts/fetch-tides.js

      - name: Commit tides.json if it changed
        run: |
          git config user.name  "tide-bot"
          git config user.email "actions@users.noreply.github.com"
          git add tides.json
          if git diff --staged --quiet; then
            echo "No change in tide data today."
          else
            git commit -m "Update tide data ($(date -u +%Y-%m-%d))"
            git push
          fi
